dataset:
  images_dir: "data/images"
  classes:
    - name: "cat"
      description: "家猫、幼猫或清晰可见的猫科宠物个体。"
    - name: "dog"
      description: "家犬、幼犬或清晰可见的犬类宠物个体。"
  image_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
  output_dir: "outputs"

yolo:
  enabled: true
  model_path: "weights/best.onnx"
  conf_threshold: 0.25
  iou_threshold: 0.5
  device: null

llama_factory:
  base_url: "http://localhost:8000/v1"
  api_key: "0"
  annotator_model: "Qwen/Qwen2.5-VL-7B-Instruct"
  reviewer_model: "Qwen/Qwen2.5-VL-7B-Instruct"
  temperature: 0.1
  request_timeout: 120
  annotator_few_shots:
    - image_path: "data/fewshot/example_01.jpg"
      label_path: "data/fewshot/example_01.txt"
    - image_path: "data/fewshot/example_02.jpg"
      label_path: "data/fewshot/example_02.txt"

pipeline:
  max_images: null
  save_intermediate_json: true
