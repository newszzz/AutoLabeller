dataset:
  images_dir: "../data/gt_dataset/images"
  output_dir: "../outputs"
  classes:
    - id: 0
      name: "upper body"
      description: "Upper body of the game characters with yellow outlines in the image"
    - id: 1
      name: "head"
      description: "Head of the game characters with yellow outlines in the image"
  image_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
  few_shots:
    - image_path: "../data/fewshot/images/2wanfeng1.jpg"
      annotation_path: "../data/fewshot/labels/2wanfeng1.txt"
    - image_path: "../data/fewshot/images/2wanfeng2.jpg"
      annotation_path: "../data/fewshot/labels/2wanfeng2.txt"

yolo:
  model_path: "../val_JZ_v8s320.onnx"
  conf_threshold: 0.25
  iou_threshold: 0.5
  device: null

llm_api:
  backend: "vllm"  # "vllm" or "ollama"; both use an OpenAI-compatible /v1 API.
  base_url: "http://localhost:8000/v1"
  api_key: "0"
  model: "models/Qwen3-VL-8B-Instruct-FP8"
  temperature: 0.0
  request_timeout: 120
