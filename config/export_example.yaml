dataset:
  images_dir: "data/train/images"
  labels_dir: "data/train/labels"
  classes:
    - name: "cat"
      description: "家猫、幼猫或清晰可见的猫科宠物个体。"
    - name: "dog"
      description: "家犬、幼犬或清晰可见的犬类宠物个体。"
  image_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"

review_generation:
  mode: "ground_truth"
  include_positive_sample: true
  negative_samples_per_image: 2
  random_seed: 42

output:
  output_dir: "outputs/llamafactory_dataset"
  dataset_name: "yolo_multitask_sft"
  data_file: "dataset.json"
  dataset_info_file: "dataset_info.json"
  image_path_mode: "relative"
